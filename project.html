<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projects Hub</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      height: 100vh;
      background: linear-gradient(135deg, #1e1e2f, #3a3a5a);
      color: white;
    }

    /* NAVBAR */
    .navbar {
      position: fixed;
      top: 0;
      width: 100%;
      padding: 15px 8%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(15, 23, 42, 0.8);
      backdrop-filter: blur(10px);
    }

    .logo {
      font-size: 20px;
      font-weight: 600;
      color: #38bdf8;
    }

    .nav-links {
      display: flex;
      list-style: none;
    }

    .nav-links li {
      margin-left: 25px;
    }

    .nav-links a {
      text-decoration: none;
      color: #cbd5f5;
    }

    /* MAIN */
    .container {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 60px;
      flex-wrap: wrap;
    }

    .card {
      text-align: center;
    }

    /* HEADINGS */
    .heading {
      font-size: 22px;
      margin-bottom: 15px;
      color: #38bdf8;
      position: relative;
    }

    .heading::after {
      content: "";
      width: 50%;
      height: 3px;
      background: #38bdf8;
      display: block;
      margin: 8px auto 0;
      border-radius: 5px;
    }

    /* BUTTON */
    .btn {
      padding: 15px 30px;
      border: none;
      border-radius: 10px;
      background: #38bdf8;
      color: #0f172a;
      font-size: 18px;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      background: #0ea5e9;
      transform: scale(1.05);
    }
  </style>
</head>

<body>

  <!-- NAVBAR -->
  <header class="navbar">
    <div class="logo">Khushi</div>

    <ul class="nav-links">
      <li><a href="#">Home</a></li>
      <li><a href="#">About</a></li>
      <li><a href="#">Projects</a></li>
      <li><a href="#">Contact</a></li>
    </ul>
  </header>

  <!-- MAIN -->
  <div class="container">

    <!-- Calculator Section -->
    <div class="card">
      <div class="heading">Calculator Project</div>
      <button class="btn" onclick="openCalculator()">Open Calculator</button>
    </div>

    <!-- Portfolio Section -->
    <div class="card">
      <div class="heading">Portfolio Project</div>
      <button class="btn" onclick="openPortfolio()">Open Portfolio</button>
    </div>

  </div>

  <!-- JS -->
  <script>
    function openCalculator() {
      window.location.href = "calculator.html";
    }

    function openPortfolio() {
      window.location.href = "https://github.com/khushibudhija-commits/codealpha_portfolio.git";
    }
  </script>

</body>
</html>
