<!DOCTYPE html>
<html lang="en">
<head>
  
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projects Hub</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      height: 100vh;
      background: linear-gradient(135deg, #1e1e2f, #3a3a5a);
      color: white;
    }

   .navbar {
      position: fixed;
      top: 0;
      width: 100%;
      padding: 15px 8%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(15, 23, 42, 0.8);
      backdrop-filter: blur(10px);
      z-index: 1000;
    }

    .logo {
      font-size: 20px;
      font-weight: 600;
      color: #38bdf8;
    }

    .nav-links {
      display: flex;
      list-style: none;
    }

    .nav-links li {
      margin-left: 25px;
    }

    .nav-links a {
      text-decoration: none;
      color: #cbd5f5;
      transition: 0.3s;
      position: relative;
    }

    .nav-links a::after {
      content: "";
      width: 0;
      height: 2px;
      background: #38bdf8;
      position: absolute;
      left: 0;
      bottom: -5px;
      transition: 0.3s;
    }

    .nav-links a:hover::after {
      width: 100%;
    }

    /* RESPONSIVE */
    @media (max-width: 768px) {
      .menu-toggle {
        display: block;
      }

      .nav-links {
        position: absolute;
        right: -100%;
        top: 60px;
        flex-direction: column;
        background: #1e293b;
        width: 200px;
        padding: 20px;
        transition: 0.3s;
      }

      .nav-links.active {
        right: 0;
      }

      .nav-links li {
        margin: 15px 0;
      }
    }

    /* MAIN */
    .container {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 60px;
      flex-wrap: wrap;
    }

    .card {
      text-align: center;
    }

    /* HEADINGS */
    .heading {
      font-size: 22px;
      margin-bottom: 15px;
      color: #38bdf8;
      position: relative;
    }

    .heading::after {
      content: "";
      width: 50%;
      height: 3px;
      background: #38bdf8;
      display: block;
      margin: 8px auto 0;
      border-radius: 5px;
    }

    /* BUTTON */
    .btn {
      padding: 15px 30px;
      border: none;
      border-radius: 10px;
      background: #38bdf8;
      color: #0f172a;
      font-size: 18px;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      background: #0ea5e9;
      transform: scale(1.05);
    }
  </style>
</head>

<body>

  <!-- NAVBAR -->
  <header class="navbar">
   
    <div class="logo">Khushi</div>
     
    <ul class="nav-links">
      <li><a href="C:\Users\hp\codealpha_portfolio\Home.html">Home</a></li>
      <li><a href="C:\Users\hp\codealpha_portfolio\About.html">About</a></li>
      <li><a href="C:\Users\hp\codealpha_portfolio\project.html">Projects</a></li>
      <li><a href="C:\Users\hp\codealpha_portfolio\contact.html">Contact</a></li>
    </ul>
     <div class="menu-toggle">&#9776;</div>



</header>
  <!-- MAIN -->
  <div class="container">

    <!-- Calculator Section -->
    <div class="card">
      <div class="heading">Calculator Project</div>
      <button class="btn" onclick="openCalculator()">Open Calculator</button>
    </div>

    <!-- Portfolio Section -->
    <div class="card">
      <div class="heading">Portfolio Project</div>
      <button class="btn" onclick="openPortfolio()">Open Portfolio</button>
    </div>
    
    <!-- Imagegallery Section -->
    <div class="card">
      <div class="heading">Image Gallery Project</div>
      <button class="btn" onclick="openImageGallery()">Open Image Gallery</button>
    </div>


  </div>

  <!-- JS -->
  <script>
    function openCalculator() {
      window.location.href = "calculator.html";
    }

    function openPortfolio() {
      window.location.href = "https://github.com/khushibudhija-commits/codealpha_portfolio.git";
    }

    function openImageGallery() {
      window.location.href = "imagegallery.html";
    }

  </script>

</body>
</html>
