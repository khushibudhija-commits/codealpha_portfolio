h1 {

/* Filters */
.filters button {
  padding: 10px 15px;
  margin: 5px;
  border: none;
  background: #333;
  color: white;
  cursor: pointer;
  border-radius: 5px;
}

.filters button:hover {
  background: #555;
}

/* Gallery */
.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 10px;
  padding: 20px;
}

.gallery img {
  width: 100%;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.3s;
}

.gallery img:hover {
  transform: scale(1.05);
}

/* Modal */
.modal {
  display: none;
  position: fixed;
  background: rgba(0,0,0,0.9);
  width: 100%;
  height: 100%;
  top: 0;
  left: 0;
}

.modal img {
  max-width: 80%;
  margin-top: 50px;
  border-radius: 10px;
}

.close {
  position: absolute;
  top: 20px;
  right: 40px;
  color: white;
  font-size: 35px;
  cursor: pointer;
}

.controls button {
  padding: 10px 20px;
  margin: 10px;
  font-size: 18px;
  cursor: pointer;
}
</style><script> currentIndex = 0;

const images = document.querySelectorAll(".gallery img");

/* OPEN MODAL */
function openModal(index) {
  document.getElementById("modal").style.display = "block";
  currentIndex = index;
  showImage();
}

/* CLOSE MODAL */
function closeModal() {
  document.getElementById("modal").style.display = "none";
}

/* SHOW IMAGE */
function showImage() {
  const modalImg = document.getElementById("modalImg");
  modalImg.src = images[currentIndex].src;
}

/* NEXT / PREVIOUS */
function changeSlide(step) {
  currentIndex += step;

  if (currentIndex >= images.length) currentIndex = 0;
  if (currentIndex < 0) currentIndex = images.length - 1;

  showImage();
}

/* FILTER FUNCTION */
function filterImages(category) {
  images.forEach(img => {
    if (category === "all") {
      img.style.display = "block";
    } else {
      if (img.classList.contains(category)) {
        img.style.display = "block";
      } else {
        img.style.display = "none";
      }
    }
  });
}</script>
