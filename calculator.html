<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator</title>

  <style>
    /* NAVBAR */
    .navbar {
      position: fixed;
      top: 0;
      width: 100%;
      padding: 15px 8%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(15, 23, 42, 0.8);
      backdrop-filter: blur(10px);
      z-index: 1000;
    }

    .logo {
      font-size: 20px;
      font-weight: 600;
      color: #38bdf8;
    }

    .nav-links {
      display: flex;
      list-style: none;
    }

    .nav-links li {
      margin-left: 25px;
    }

    .nav-links a {
      text-decoration: none;
      color: #cbd5f5;
      transition: 0.3s;
      position: relative;
    }

    .nav-links a::after {
      content: "";
      width: 0;
      height: 2px;
      background: #38bdf8;
      position: absolute;
      left: 0;
      bottom: -5px;
      transition: 0.3s;
    }

    .nav-links a:hover::after {
      width: 100%;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #1e1e2f, #3a3a5a);
    }

    .calculator {
      background: #2b2b3c;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      width: 300px;
    }

    #display {
      width: 100%;
      height: 60px;
      margin-bottom: 15px;
      border: none;
      outline: none;
      background: #1c1c2b;
      color: #fff;
      font-size: 24px;
      text-align: right;
      padding: 10px;
      border-radius: 10px;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    button {
      padding: 15px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      background: #3b3b5c;
      color: #fff;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #57577a;
    }

    .equal {
      grid-row: span 2;
      background: #ff6b6b;
    }

    .equal:hover {
      background: #ff4b4b;
    }

    .zero {
      grid-column: span 2;
    }
  </style>
</head>

<body>
<header class="navbar">
    <div class="logo">Khushi</div>

    <ul class="nav-links">
      <li><a href="C:\Users\hp\codealpha_portfolio\Home.html">Home</a></li>
      <li><a href="C:\Users\hp\codealpha_portfolio\About.html">About</a></li>
      <li><a href="C:\Users\hp\codealpha_portfolio\project.html">Projects</a></li>
      <li><a href="C:\Users\hp\codealpha_portfolio\contact.html">Contact</a></li>
    </ul>

    <div class="menu-toggle">&#9776;</div>
  </header>
  <div class="calculator">
    <input type="text" id="display" readonly>

    <div class="buttons">
      <button onclick="clearDisplay()">C</button>
      <button onclick="deleteLast()">DEL</button>
      <button onclick="appendValue('/')">÷</button>
      <button onclick="appendValue('*')">×</button>

      <button onclick="appendValue('7')">7</button>
      <button onclick="appendValue('8')">8</button>
      <button onclick="appendValue('9')">9</button>
      <button onclick="appendValue('-')">−</button>

      <button onclick="appendValue('4')">4</button>
      <button onclick="appendValue('5')">5</button>
      <button onclick="appendValue('6')">6</button>
      <button onclick="appendValue('+')">+</button>

      <button onclick="appendValue('1')">1</button>
      <button onclick="appendValue('2')">2</button>
      <button onclick="appendValue('3')">3</button>
      <button class="equal" onclick="calculate()">=</button>

      <button onclick="appendValue('0')" class="zero">0</button>
      <button onclick="appendValue('.')">.</button>
    </div>
  </div>

  <script>
    const display = document.getElementById("display");

    function appendValue(value) {
      display.value += value;
    }

    function clearDisplay() {
      display.value = "";
    }

    function deleteLast() {
      display.value = display.value.slice(0, -1);
    }

    function calculate() {
      try {
        display.value = eval(display.value);
      } catch {
        display.value = "Error";
      }
    }

    document.addEventListener("keydown", (e) => {
      if (!isNaN(e.key) || "+-*/.".includes(e.key)) {
        appendValue(e.key);
      } else if (e.key === "Enter") {
        calculate();
      } else if (e.key === "Backspace") {
        deleteLast();
      } else if (e.key === "Escape") {
        clearDisplay();
      }
    });
  </script>

</body>
</html>
